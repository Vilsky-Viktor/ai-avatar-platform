x-dns: &default-dns
  dns:
    - 8.8.8.8
    - 8.8.4.4

networks:
  app-net:
    driver: bridge

services:
  ui-app:
    <<: *default-dns
    networks:
      - app-net
    build:
      context: ./ui-app
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    volumes:
      - ./ui-app:/app
      - /app/node_modules

  api-gateway:
    <<: *default-dns
    networks:
      - app-net
    build:
      context: ./api-gateway
    ports:
      - "3000:3000"
    volumes:
      - ./api-gateway:/app
      - /app/node_modules
    environment:
      - PORT=3000
      - NODE_ENV=development
      - USER_SERVICE_URL=http://user-service:3100
      - AVATAR_SERVICE_URL=http://avatar-service:3200
      - JOB_MANAGER_SERVICE_URL=http://job-manager-service:3300
      - MEDIA_SERVICE_URL=http://media-service:3400
      - VOICE_SERVICE_URL=http://media-service:3600

  user-service:
    <<: *default-dns
    networks:
      - app-net
    build:
      context: ./user-service
    ports:
      - "3100:3100"
    volumes:
      - ./user-service:/app
      - /app/node_modules
      - ./gcp-json-key.json:/root/.config/gcloud/gcp-json-key.json:ro
    environment:
      - PORT=3100
      - NODE_ENV=development
      - GOOGLE_APPLICATION_CREDENTIALS=/root/.config/gcloud/gcp-json-key.json
      - PROJECT_ID=loom24-mvp
      - DB_NAME=ai-avatar-db
      - COLLECTION_NAME=users

  avatar-service:
    <<: *default-dns
    networks:
      - app-net
    build:
      context: ./avatar-service
    ports:
      - "3200:3200"
    volumes:
      - ./avatar-service:/app
      - /app/node_modules
      - ./gcp-json-key.json:/root/.config/gcloud/gcp-json-key.json:ro
    environment:
      - PORT=3200
      - NODE_ENV=development
      - GOOGLE_APPLICATION_CREDENTIALS=/root/.config/gcloud/gcp-json-key.json
      - PROJECT_ID=loom24-mvp
      - DB_NAME=ai-avatar-db
      - USERS_COLLECTION_NAME=users
      - AVATARS_COLLECTION_NAME=avatars
      - JOB_MANAGER_SERVICE_URL=http://job-manager-service:3300
      - MEDIA_SERVICE_URL=http://media-service:3400

  job-manager-service:
    <<: *default-dns
    networks:
      - app-net
    build:
      context: ./job-manager-service
    ports:
      - "3300:3300"
    volumes:
      - ./job-manager-service:/app
      - /app/node_modules
      - ./gcp-json-key.json:/root/.config/gcloud/gcp-json-key.json:ro
    environment:
      - PORT=3300
      - NODE_ENV=development
      - GOOGLE_APPLICATION_CREDENTIALS=/root/.config/gcloud/gcp-json-key.json
      - PROJECT_ID=loom24-mvp
      - DB_NAME=ai-avatar-db
      - JOBS_COLLECTION_NAME=jobs
      - GENERAGE_TEXT_IMAGE_TO_IMAGE_TOPIC=generate-text-image-to-image
      - RUNPOD_SERVICE_URL=http://runpod-service:3500
      - LLM_REQUEST_SERVICE_URL=http://llm-request-service:3700

  ai-model-result-service:
    <<: *default-dns
    networks:
      - app-net
    build:
      context: ./ai-model-result-service
    volumes:
      - ./ai-model-result-service:/app
      - /app/node_modules
      - ./gcp-json-key.json:/root/.config/gcloud/gcp-json-key.json:ro
    environment:
      - NODE_ENV=development
      - GOOGLE_APPLICATION_CREDENTIALS=/root/.config/gcloud/gcp-json-key.json
      - PROJECT_ID=loom24-mvp
      - AVATAR_SERVICE_URL=http://avatar-service:3200
      - JOB_MANAGER_SERVICE_URL=http://job-manager-service:3300
      - MEDIA_SERVICE_URL=http://media-service:3400
      - SUBSCRIPTION_ID=ai-model-result-sub

  media-service:
    <<: *default-dns
    networks:
      - app-net
    build:
      context: ./media-service
    ports:
      - "3400:3400"
    volumes:
      - ./media-service:/app
      - /app/node_modules
      - ./gcp-json-key.json:/root/.config/gcloud/gcp-json-key.json:ro
    environment:
      - PORT=3400
      - NODE_ENV=development
      - GOOGLE_APPLICATION_CREDENTIALS=/root/.config/gcloud/gcp-json-key.json
      - PROJECT_ID=loom24-mvp
      - DB_NAME=ai-avatar-db
      - BUCKET_NAME=loom24-mvp.firebasestorage.app
      - MEDIA_COLLECTION_NAME=media
      - AVATAR_SERVICE_URL=http://avatar-service:3200

  runpod-service:
    <<: *default-dns
    networks:
      - app-net
    build:
      context: ./runpod-service
    ports:
      - "3500:3500"
    volumes:
      - ./runpod-service:/app
      - /app/node_modules
      - ./gcp-json-key.json:/root/.config/gcloud/gcp-json-key.json:ro
    environment:
      - PORT=3500
      - NODE_ENV=development
      - GOOGLE_APPLICATION_CREDENTIALS=/root/.config/gcloud/gcp-json-key.json
      - PROJECT_ID=loom24-mvp
      - RUNPOD_API_URL=https://rest.runpod.io
      - NETWORK_VOLUME_ID=0p9gfckg9x
      - TEXT_IMAGE_TO_IMAGE_TEMPLATE_ID=m1bv0g3gi7
      - REGION=US-CA-2

  voice-service:
    <<: *default-dns
    networks:
      - app-net
    build:
      context: ./voice-service
    ports:
      - "3600:3600"
    volumes:
      - ./voice-service:/app
      - /app/node_modules
      - ./gcp-json-key.json:/root/.config/gcloud/gcp-json-key.json:ro
    environment:
      - PORT=3600
      - NODE_ENV=development
      - GOOGLE_APPLICATION_CREDENTIALS=/root/.config/gcloud/gcp-json-key.json
      - PROJECT_ID=loom24-mvp
      - DB_NAME=ai-avatar-db
      - BUCKET_NAME=loom24-mvp.firebasestorage.app
      - MEDIA_COLLECTION_NAME=voices

  llm-request-service:
    <<: *default-dns
    networks:
      - app-net
    build:
      context: ./llm-request-service
    ports:
      - "3700:3700"
    volumes:
      - ./llm-request-service:/app
      - /app/node_modules
      - ./gcp-json-key.json:/root/.config/gcloud/gcp-json-key.json:ro
    environment:
      - PORT=3700
      - NODE_ENV=development
      - GOOGLE_APPLICATION_CREDENTIALS=/root/.config/gcloud/gcp-json-key.json
      - PROJECT_ID=loom24-mvp
      - BUCKET_NAME=loom24-mvp.firebasestorage.app
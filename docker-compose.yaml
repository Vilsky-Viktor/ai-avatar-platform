x-dns: &default-dns
  dns:
    - 8.8.8.8
    - 8.8.4.4

networks:
  app-net:
    driver: bridge

secrets:
  gcp_key:
    file: ./gcp-json-key.json

services:
  ui-app:
    <<: *default-dns
    networks:
      - app-net
    build:
      context: ./ui-app
      dockerfile: Dockerfile.dev
      secrets:
        - gcp_key
    ports:
      - "5173:5173"
    volumes:
      - ./ui-app:/app
      - /app/node_modules

  api-gateway:
    <<: *default-dns
    networks:
      - app-net
    build:
      context: ./api-gateway
      dockerfile: Dockerfile.dev
      secrets:
        - gcp_key
    ports:
      - "3000:3000"
    volumes:
      - ./api-gateway:/app
      - /app/node_modules
      - ./gcp-json-key.json:/root/.config/gcloud/gcp-json-key.json:ro
    environment:
      - PORT=3000
      - NODE_ENV=development
      - PROJECT_ID=loom24-mvp
      - GOOGLE_APPLICATION_CREDENTIALS=/root/.config/gcloud/gcp-json-key.json
      - USER_URL=http://user:3100
      - AVATAR_URL=http://avatar:3200
      - JOB_MANAGER_URL=http://job-manager:3300
      - VOICE_URL=http://voice:3600
      - CROPPER_URL=http://cropper:3800
      - PROXY_TIMEOUT_MS=30000

  user:
    <<: *default-dns
    networks:
      - app-net
    build:
      context: ./user
      dockerfile: Dockerfile.dev
      secrets:
        - gcp_key
    ports:
      - "3100:3100"
    volumes:
      - ./user:/app
      - /app/node_modules
      - ./gcp-json-key.json:/root/.config/gcloud/gcp-json-key.json:ro
    environment:
      - PORT=3100
      - NODE_ENV=development
      - GOOGLE_APPLICATION_CREDENTIALS=/root/.config/gcloud/gcp-json-key.json
      - PROJECT_ID=loom24-mvp
      - DB_NAME=ai-avatar-db
      - USERS_COLLECTION_NAME=users

  avatar:
    <<: *default-dns
    networks:
      - app-net
    build:
      context: ./avatar
      dockerfile: Dockerfile.dev
      secrets:
        - gcp_key
    ports:
      - "3200:3200"
    volumes:
      - ./avatar:/app
      - /app/node_modules
      - ./gcp-json-key.json:/root/.config/gcloud/gcp-json-key.json:ro
    environment:
      - PORT=3200
      - NODE_ENV=development
      - GOOGLE_APPLICATION_CREDENTIALS=/root/.config/gcloud/gcp-json-key.json
      - PROJECT_ID=loom24-mvp
      - BUCKET_NAME=loom24-mvp.firebasestorage.app
      - DB_NAME=ai-avatar-db
      - USERS_COLLECTION_NAME=users
      - AVATARS_COLLECTION_NAME=avatars
      - JOB_MANAGER_URL=http://job-manager:3300

  job-manager:
    <<: *default-dns
    networks:
      - app-net
    build:
      context: ./job-manager
      dockerfile: Dockerfile.dev
      secrets:
        - gcp_key
    ports:
      - "3300:3300"
    volumes:
      - ./job-manager:/app
      - /app/node_modules
      - ./gcp-json-key.json:/root/.config/gcloud/gcp-json-key.json:ro
    environment:
      - PORT=3300
      - NODE_ENV=development
      - GOOGLE_APPLICATION_CREDENTIALS=/root/.config/gcloud/gcp-json-key.json
      - PROJECT_ID=loom24-mvp
      - BUCKET_NAME=loom24-mvp.firebasestorage.app
      - DB_NAME=ai-avatar-db
      - JOBS_COLLECTION_NAME=jobs
      - WORKFLOW_MANAGER_TOPIC=workflow-manager
      - AVATAR_URL=http://avatar:3200

  voice:
    <<: *default-dns
    networks:
      - app-net
    build:
      context: ./voice
      dockerfile: Dockerfile.dev
      secrets:
        - gcp_key
    ports:
      - "3600:3600"
    volumes:
      - ./voice:/app
      - /app/node_modules
      - ./gcp-json-key.json:/root/.config/gcloud/gcp-json-key.json:ro
    environment:
      - PORT=3600
      - NODE_ENV=development
      - GOOGLE_APPLICATION_CREDENTIALS=/root/.config/gcloud/gcp-json-key.json
      - PROJECT_ID=loom24-mvp
      - DB_NAME=ai-avatar-db
      - BUCKET_NAME=loom24-mvp.firebasestorage.app

  cropper:
    <<: *default-dns
    platform: linux/amd64
    networks:
      - app-net
    build:
      context: ./cropper
      dockerfile: Dockerfile.dev
      secrets:
        - gcp_key
    ports:
      - "3800:3800"
    volumes:
      - ./cropper:/app
      - ./gcp-json-key.json:/root/.config/gcloud/gcp-json-key.json:ro
    environment:
      - PORT=3800
      - BUCKET_NAME=loom24-mvp.firebasestorage.app
      - GOOGLE_APPLICATION_CREDENTIALS=/root/.config/gcloud/gcp-json-key.json
      - JOB_MANAGER_URL=http://job-manager:3300
      - MAX_CONCURRENT_CROPS=4

  ai-model-gateway:
    <<: *default-dns
    networks:
      - app-net
    build:
      context: ./ai-model-gateway
      dockerfile: Dockerfile.dev
      secrets:
        - gcp_key
    volumes:
      - ./ai-model-gateway:/app
      - /app/node_modules
      - ./gcp-json-key.json:/root/.config/gcloud/gcp-json-key.json:ro
    environment:
      - NODE_ENV=development
      - PROJECT_ID=loom24-mvp
      - BUCKET_NAME=loom24-mvp.firebasestorage.app
      - GOOGLE_APPLICATION_CREDENTIALS=/root/.config/gcloud/gcp-json-key.json
      - SUBSCRIPTION_ID=ai-model-gateway-sub
      - MAX_CONCURRENT_MESSAGES=10
      - WORKFLOW_MANAGER_TOPIC=workflow-manager
      - JOB_MANAGER_URL=http://job-manager:3300

  workflow-manager:
    <<: *default-dns
    networks:
      - app-net
    build:
      context: ./workflow-manager
      dockerfile: Dockerfile.dev
      secrets:
        - gcp_key
    volumes:
      - ./workflow-manager:/app
      - /app/node_modules
      - ./gcp-json-key.json:/root/.config/gcloud/gcp-json-key.json:ro
    environment:
      - NODE_ENV=development
      - GOOGLE_APPLICATION_CREDENTIALS=/root/.config/gcloud/gcp-json-key.json
      - PROJECT_ID=loom24-mvp
      - BUCKET_NAME=loom24-mvp.firebasestorage.app
      - SUBSCRIPTION_ID=workflow-manager-sub
      - JOB_MANAGER_URL=http://job-manager:3300
      - MAX_CONCURRENT_MESSAGES=10

  head-direction-checker:
    <<: *default-dns
    networks:
      - app-net
    build:
      context: ./head-direction-checker
      dockerfile: Dockerfile.dev
      secrets:
        - gcp_key
    volumes:
      - ./head-direction-checker:/app
      - /app/node_modules
      - /app/models
      - ./gcp-json-key.json:/root/.config/gcloud/gcp-json-key.json:ro
    environment:
      - NODE_ENV=development
      - GOOGLE_APPLICATION_CREDENTIALS=/root/.config/gcloud/gcp-json-key.json
      - PROJECT_ID=loom24-mvp
      - SUBSCRIPTION_ID=head-direction-checker-sub
      - WORKFLOW_MANAGER_TOPIC=workflow-manager
      - BUCKET_NAME=loom24-mvp.firebasestorage.app
      - JOB_MANAGER_URL=http://job-manager:3300
      - MAX_CONCURRENT_MESSAGES=10

  thumbnail-maker:
    <<: *default-dns
    networks:
      - app-net
    build:
      context: ./thumbnail-maker
      dockerfile: Dockerfile.dev
      secrets:
        - gcp_key
    volumes:
      - ./thumbnail-maker:/app
      - /app/node_modules
      - ./gcp-json-key.json:/root/.config/gcloud/gcp-json-key.json:ro
    environment:
      - NODE_ENV=development
      - GOOGLE_APPLICATION_CREDENTIALS=/root/.config/gcloud/gcp-json-key.json
      - PROJECT_ID=loom24-mvp
      - SUBSCRIPTION_ID=thumbnail-maker-sub
      - WORKFLOW_MANAGER_TOPIC=workflow-manager
      - BUCKET_NAME=loom24-mvp.firebasestorage.app
      - JOB_MANAGER_URL=http://job-manager:3300
      - MAX_CONCURRENT_MESSAGES=10

  face-matcher:
    <<: *default-dns
    platform: linux/amd64
    networks:
      - app-net
    build:
      context: ./face-matcher
      dockerfile: Dockerfile.dev
      secrets:
        - gcp_key
    volumes:
      - ./face-matcher:/app
      - ./gcp-json-key.json:/root/.config/gcloud/gcp-json-key.json:ro
    environment:
      - GOOGLE_APPLICATION_CREDENTIALS=/root/.config/gcloud/gcp-json-key.json
      - PROJECT_ID=loom24-mvp
      - BUCKET_NAME=loom24-mvp.firebasestorage.app
      - SUBSCRIPTION_ID=face-matcher-sub
      - WORKFLOW_MANAGER_TOPIC=workflow-manager
      - JOB_MANAGER_URL=http://job-manager:3300
      - INSIGHTFACE_MODEL=buffalo_l
      - INSIGHTFACE_ROOT=/models/insightface
      - ADAFACE_MODEL_DIR=/app/models/adaface
      - ADAFACE_ARCHITECTURE=ir_101
      - POOL_SIZE=1
      - MAX_CONCURRENT_MESSAGES=1
